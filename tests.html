<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebCAD — 테스트</title>
<style>
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:#15151a;color:#e6e6ea;}
  header{padding:14px 20px;background:#2a2a30;border-bottom:1px solid #3d3d46;position:sticky;top:0;}
  h1{margin:0;font-size:18px;} #summary{margin-top:6px;font-size:14px;}
  .pass{color:#6ad28a;} .fail{color:#ff6b6b;} .muted{color:#9a9aa5;}
  #results{padding:10px 20px;font-family:Consolas,monospace;font-size:12.5px;line-height:1.7;}
  .group{margin:10px 0 2px;color:#4ea1ff;font-weight:700;font-family:"Segoe UI";}
  .case{white-space:pre-wrap;}
  iframe{position:fixed;left:-9999px;width:1200px;height:800px;border:0;}
  #rerun{background:#2b6fc0;color:#fff;border:0;border-radius:6px;padding:6px 14px;cursor:pointer;margin-left:12px;}
</style>
</head>
<body>
<header>
  <h1>▦ WebCAD 자동 테스트 <button id="rerun">다시 실행</button></h1>
  <div id="summary" class="muted">앱 로딩 중…</div>
</header>
<div id="results"></div>
<iframe id="app" src="index.html"></iframe>

<script>
const R = document.getElementById('results'), S = document.getElementById('summary');
let pass = 0, fail = 0, T = null;

function group(name){ const d=document.createElement('div'); d.className='group'; d.textContent='▷ '+name; R.appendChild(d); }
function record(ok, msg){
  const d=document.createElement('div'); d.className='case '+(ok?'pass':'fail');
  d.textContent=(ok?'  ✓ ':'  ✗ ')+msg; R.appendChild(d);
  ok?pass++:fail++;
}
const near = (a,b,tol=1e-6)=>Math.abs(a-b)<=tol;
function ok(cond,msg){ record(!!cond,msg); }
function eq(a,b,msg,tol=1e-6){ record(near(a,b,tol), `${msg}  (${(+a).toFixed?(+a).toFixed(4):a} ≈ ${b})`); }
function eqi(a,b,msg){ record(a===b, `${msg}  (${a} === ${b})`); }
function pt(p, x, y, msg, tol=1e-4){ record(near(p[0]??p.x,x,tol)&&near(p[1]??p.y,y,tol), `${msg}  (${(p[0]??p.x).toFixed(3)},${(p[1]??p.y).toFixed(3)} ≈ ${x},${y})`); }

function updateSummary(label){
  const total=pass+fail;
  S.innerHTML = fail===0
    ? `<span class="pass">✔ 전체 통과 — ${pass}/${total}${label||''}</span>`
    : `<span class="fail">✗ 실패 ${fail}개</span> / 통과 ${pass} (총 ${total})`;
  document.title = (fail===0?'PASS':'FAIL('+fail+')')+` — WebCAD 테스트`;
}
function finishAsync(){ updateSummary(); }
function runAll(){
  R.innerHTML=''; pass=0; fail=0;
  try { tests(); }
  catch(e){ record(false, 'FATAL: '+e.message+'\n'+(e.stack||'')); }
  updateSummary(' (동기)');
}

function tests(){
  const C = T;                    // __CADTEST__
  const S0 = C.state;
  const reset = () => C.reset();
  // 픽스처의 light:{...} 는 새 모델(state.lights 컬렉션 + e.lightId)로 변환해 넣는다.
  // 광원 속성은 개체가 아니라 컬렉션에 사는 것이 실제 구조이므로, 여기서 한 번에 옮긴다.
  const setEnts = (arr) => {
    reset();
    S0.lights.length = 0; S0.nextLightId = 1;
    S0.entities = arr.map((e,i)=>({id:i+1,...e}));
    S0.nextId = arr.length+1;
    S0.entities.forEach(e => {
      if (!e.light) return;
      const over = e.light; delete e.light;
      const L = Object.assign({ id: 'L'+(S0.nextLightId++), objectId: e.id, name: 'test',
        type:'emissive', enabled:true, intensity:800, colorTemp:3000, color:null,
        range:3000, soft:400, bounce:0.5, spacing:3000 }, over);
      S0.lights.push(L); e.lightId = L.id;
    });
  };

  group('기하 — 교차/투영/각도');
  { const r=C.segSeg([0,0],[10,0],[5,-5],[5,5]); pt([r.x,r.y],5,0,'선분 교차 (5,0)'); }
  ok(C.segSeg([0,0],[10,0],[0,1],[10,1])===null, '평행 선분 = null');
  { const hs=C.segCircle([-20,0],[20,0],0,0,10).filter(h=>h.t>=0&&h.t<=1); ok(hs.length===2,'선-원 교차 2점'); }
  eq(C.distToSeg(5,3,0,0,10,0),3,'점-선분 거리 = 3');
  eq(C.ang(0,0,1,1),45,'각도 45°');
  ok(C.angleInArc(45,0,90),'45°는 [0,90] 호 안');
  ok(!C.angleInArc(180,0,90),'180°는 호 밖');
  pt(C.closestOnSeg(5,9,0,0,10,0),5,0,'선분 위 최근접점');

  group('교차 스냅 — intersectEntities');
  { const L1={type:'LINE',x1:0,y1:0,x2:10,y2:10}, L2={type:'LINE',x1:0,y1:10,x2:10,y2:0};
    const xs=C.intersectEntities(L1,L2); ok(xs.length===1,'X자 교차 1점'); if(xs[0]) pt(xs[0],5,5,'교차점 (5,5)'); }
  { const L={type:'LINE',x1:-20,y1:0,x2:20,y2:0}, Ci={type:'CIRCLE',cx:0,cy:0,r:10};
    const xs=C.intersectEntities(L,Ci); ok(xs.length===2,'선-원 교차 2점'); }
  { const A={type:'CIRCLE',cx:0,cy:0,r:10}, B={type:'CIRCLE',cx:16,cy:0,r:10};
    const xs=C.intersectEntities(A,B); ok(xs.length===2,'원-원 교차 2점'); if(xs[0]) eq(xs[0][0],8,'교차 x=8'); }

  group('경계상자 / 윈도우·크로싱');
  { const e={type:'CIRCLE',cx:5,cy:5,r:3}; const bb=C.entityBBox(e); pt([bb.xmin,bb.ymin],2,2,'원 bbox 최소'); pt([bb.xmax,bb.ymax],8,8,'원 bbox 최대'); }
  { const e={type:'LINE',x1:1,y1:1,x2:4,y2:4};
    ok(C.entityFullyInBox(e,{xmin:0,ymin:0,xmax:5,ymax:5}),'윈도우: 완전 포함 → 선택');
    ok(!C.entityFullyInBox(e,{xmin:0,ymin:0,xmax:3,ymax:3}),'윈도우: 일부만 → 제외');
    ok(C.entityCrossesBox(e,{xmin:2,ymin:2,xmax:3,ymax:3}),'크로싱: 걸침 → 선택'); }
  ok(C.pointInBoundary({kind:'poly',points:[[0,0],[10,0],[10,10],[0,10]]},5,5),'다각형 내부 점');
  ok(!C.pointInBoundary({kind:'poly',points:[[0,0],[10,0],[10,10],[0,10]]},15,5),'다각형 외부 점');

  group('변환 — 이동/회전/대칭/배율');
  { const e={type:'LINE',x1:0,y1:0,x2:2,y2:0}; C.translateEntity(e,5,3); pt([e.x1,e.y1],5,3,'이동'); }
  { const e={type:'ARC',cx:10,cy:0,r:5,startAngle:0,endAngle:90}; C.applyTransform(e,C.T_rotate(0,0,90)); pt([e.cx,e.cy],0,10,'호 중심 회전'); eq(e.startAngle,90,'호 시작각 +90'); }
  { const e={type:'ARC',cx:0,cy:5,r:3,startAngle:0,endAngle:90}; C.applyTransform(e,C.T_mirror(0,0,1,0)); ok(Math.abs(e.cy+5)<1e-6,'대칭: 중심 y반전'); }
  { const e={type:'CIRCLE',cx:2,cy:0,r:4}; C.scaleEntities([e],{x:0,y:0},2); eq(e.r,8,'배율 ×2 반지름'); pt([e.cx,e.cy],4,0,'배율 중심'); }

  group('좌표 파서 — parsePointOrNumber');
  { const p=C.parsePointOrNumber('10,20'); eqi(p.kind,'abs','절대 x,y'); pt([p.x,p.y],10,20,'절대값'); }
  { const p=C.parsePointOrNumber('@3,4'); eqi(p.kind,'rel','상대 @dx,dy'); }
  { const p=C.parsePointOrNumber('@10<30'); eqi(p.kind,'rel','극좌표'); eq(p.dx,10*Math.cos(Math.PI/6),'극좌표 dx'); eq(p.dy,10*Math.sin(Math.PI/6),'극좌표 dy'); }
  { const p=C.parsePointOrNumber('42.5'); eqi(p.kind,'num','단일 수치'); eq(p.n,42.5,'수치값'); }
  ok(C.parsePointOrNumber('abc')===null,'문자 = null');

  group('편집 — 오프셋/모깎기/모따기/자르기');
  { const e={type:'LINE',x1:0,y1:0,x2:10,y2:0}; const o=C.offsetEntity(e,5,{x:5,y:100}); pt([o.x1,o.y1],0,5,'선 오프셋 +5(위쪽)'); }
  { // 닫힌 폴리라인 오프셋: 4모서리 모두 마이터 (정상 케이스)
    const dia=[[0,100],[100,0],[0,-100],[-100,0]];
    const o=C.offsetEntity({type:'LWPOLYLINE',closed:true,points:dia},10,{x:0,y:0});
    pt(o.points[0],0,86,'닫힌 오프셋: 첫 모서리 마이터',1.5); ok(o.points.length===4&&o.closed,'닫힌 오프셋: 4점 닫힘'); }
  { // 시작점 중복으로 닫은 폴리라인 오프셋 — 0-길이 세그먼트로 모서리 깨지던 회귀
    const dia=[[0,100],[100,0],[0,-100],[-100,0],[0,100]];
    const o=C.offsetEntity({type:'LWPOLYLINE',closed:true,points:dia},10,{x:0,y:0});
    pt(o.points[0],0,86,'중복점 닫힌 오프셋: 첫 모서리 마이터',1.5); ok(o.points.length===4&&o.closed,'중복점 닫힌 오프셋: 중복 제거+닫힘 유지'); }
  { setEnts([{type:'LINE',x1:0,y1:0,x2:10,y2:0}]);
    S0.currentLayer='0';
    const l1={type:'LINE',x1:0,y1:0,x2:10,y2:0}, l2={type:'LINE',x1:10,y1:0,x2:10,y2:10};
    S0.entities=[{id:1,...l1},{id:2,...l2}]; C.doFillet(S0.entities[0],S0.entities[1],0);
    pt([S0.entities[0].x2,S0.entities[0].y2],10,0,'모깎기 R0: 코너 정합'); }
  { // 폴리라인 모서리 모깎기 (평면·3D 공통) — 사각형 꼭짓점(1000,0)을 반지름 100 호로
    const e={type:'LWPOLYLINE',closed:true,points:[[0,0],[1000,0],[1000,600],[0,600]]};
    const r=C.filletPolyCorner(e,0,1,100); // seg0(아래)+seg1(오른쪽) 공유 꼭짓점
    ok(r && e.points.length>4 && e.closed, '폴리라인 모깎기: 꼭짓점→호 치환 + 닫힘 유지');
    const has=(x,y)=>e.points.some(p=>Math.abs(p[0]-x)<=2&&Math.abs(p[1]-y)<=2);
    ok(has(900,0)&&has(1000,100)&&!has(1000,0),'폴리라인 모깎기: 접점 생성 + 원 꼭짓점 제거');
    const cen=[900,100], arc=e.points.filter(p=>p[0]>850&&p[1]<150);
    ok(arc.length&&arc.every(p=>Math.abs(Math.hypot(p[0]-cen[0],p[1]-cen[1])-100)<1),'폴리라인 모깎기: 호가 반지름 100');
    const fresh={type:'LWPOLYLINE',closed:true,points:[[0,0],[1000,0],[1000,600],[0,600]]};
    ok(C.nearestPolySeg(fresh,{x:0,y:300})===3 && C.nearestPolySeg(fresh,{x:1000,y:300})===1,'nearestPolySeg: 변 인덱스(좌=3,우=1)'); }
  { // 폴리라인 비인접: 서로 "교차"하는 두 변만 필렛(교점이 두 변 위). 떨어진 두 변은 거부(형태 뒤집힘 방지)
    // 교차: seg0 (0,0)-(400,400), seg2 (400,0)-(0,400) → 교점 (200,200) 두 변 위
    const eX={type:'LWPOLYLINE',closed:false,points:[[0,0],[400,400],[400,0],[0,400]]};
    ok(C.filletPolyCorner(eX,0,2,50)===true,'비인접(교차) 모깎기: 교차하는 두 변은 필렛');
    // 떨어진 두 변(연장해야 만남): seg0 수평 + seg3 수직 → 교점(600,0)이 seg3 밖 → 거부
    const eE={type:'LWPOLYLINE',closed:false,points:[[0,0],[1000,0],[1000,400],[600,400],[600,1000]]};
    ok(C.filletPolyCorner(eE,0,3,100)===false,'비인접(떨어진) 모깎기: 연장 필요한 두 변 거부');
    // 발산(지그재그 바깥 두 팔): 형태 뒤집힘 → 거부
    const eW={type:'LWPOLYLINE',closed:false,points:[[0,1000],[700,0],[1000,600],[1300,0],[2000,1000]]};
    ok(C.filletPolyCorner(eW,0,3,150)===false && eW.points.length===5,'비인접(발산) 모깎기: 형태 뒤집힘 거부·원형 유지'); }
  { const l1={id:1,type:'LINE',x1:0,y1:0,x2:100,y2:0}, l2={id:2,type:'LINE',x1:100,y1:0,x2:100,y2:100};
    reset(); S0.entities=[l1,l2]; C.doChamfer(l1,l2,10);
    pt([l1.x2,l1.y2],90,0,'모따기: 첫 선 끝 90'); pt([l2.x1,l2.y1],100,10,'모따기: 둘째 선 시작 (100,10)'); }
  { // trim: 수평선 + 수직 경계 2개, 빠른모드(모든 객체 기준) x=100 지점 제거
    const H={id:1,type:'LINE',x1:0,y1:0,x2:200,y2:0};
    const V1={id:2,type:'LINE',x1:60,y1:-10,x2:60,y2:10}, V2={id:3,type:'LINE',x1:140,y1:-10,x2:140,y2:10};
    reset(); S0.entities=[H,V1,V2]; C.trimLine(H,{x:100,y:0},null);
    // H는 [0,60]으로 잘리고 새 조각 [140,200] 추가
    const hs=S0.entities.filter(e=>e.type==='LINE'&&Math.abs(e.y1)<1e-6&&Math.abs(e.y2)<1e-6)
      .map(e=>[Math.min(e.x1,e.x2),Math.max(e.x1,e.x2)]).sort((a,b)=>a[0]-b[0]);
    ok(hs.length===2 && near(hs[0][1],60) && near(hs[1][0],140),'자르기: [0,60]+[140,200] 두 조각'); }

  group('면적/둘레/다각형');
  eq(C.polyArea([[0,0],[10,0],[10,10],[0,10]]),100,'정사각형 면적 100');
  eq(C.polyPerimeter([[0,0],[10,0],[10,10],[0,10]],true),40,'정사각형 둘레 40');
  { const p=C.polygonPoints(0,0,10,4,0); ok(p.length===4,'4각형 정점 4개'); eq(Math.hypot(p[0][0],p[0][1]),10,'정점 반지름 10'); }

  group('해치 — 경계 내부 세그먼트');
  { const e={type:'HATCH',pattern:'ansi31',spacing:5,boundary:{kind:'poly',points:[[0,0],[40,0],[40,30],[0,30]]}};
    const hs=C.computeHatchSegs(e);
    ok(hs.segs.length>0,'해치 세그먼트 생성');
    const inside=hs.segs.every(s=>C.pointInBoundary(e.boundary,(s[0]+s[2])/2,(s[1]+s[3])/2));
    ok(inside,'모든 해치선 중점이 경계 내부'); }

  group('블록 — insertChildren 변환');
  { reset(); S0.blocks={ B:{ entities:[{type:'LINE',x1:0,y1:0,x2:10,y2:0}] } };
    const ch=C.insertChildren({type:'INSERT',layer:'0',name:'B',x:100,y:50,sx:2,sy:2,rot:0});
    ok(ch.length===1,'블록 자식 1개'); pt([ch[0].x1,ch[0].y1],100,50,'삽입점 반영'); pt([ch[0].x2,ch[0].y2],120,50,'배율 ×2 반영'); }
  { reset(); S0.blocks={ B:{ entities:[{type:'LINE',x1:0,y1:0,x2:10,y2:0}] } };
    const ch=C.insertChildren({type:'INSERT',layer:'0',name:'B',x:0,y:0,sx:1,sy:1,rot:90});
    pt([ch[0].x2,ch[0].y2],0,10,'회전 90° 반영'); }

  group('DXF 왕복 — 색/레이어/좌표');
  { const P=(c,v)=>`${c}\n${v}\n`;
    let dxf=P(0,'SECTION')+P(2,'ENTITIES')
      +P(0,'LINE')+P(8,'0')+P(10,0)+P(20,0)+P(11,30)+P(21,40)
      +P(0,'CIRCLE')+P(8,'치수')+P(62,1)+P(10,5)+P(20,5)+P(40,12.5)
      +P(0,'ENDSEC')+P(0,'EOF');
    C.reset();
    const okLoad=C.loadDXF(dxf);
    ok(okLoad,'DXF 로드 성공');
    ok(S0.entities.length===2,'엔티티 2개');
    const ln=S0.entities.find(e=>e.type==='LINE'); if(ln){ eq(Math.hypot(ln.x2-ln.x1,ln.y2-ln.y1),50,'선 길이 50(3-4-5)'); }
    const ci=S0.entities.find(e=>e.type==='CIRCLE'); if(ci){ eq(ci.r,12.5,'원 반지름 12.5'); eqi(ci.color,'#ff0000','ACI 1 → 빨강'); }
    // 재직렬화 후 다시 파싱 → 개수 유지
    const out=C.buildDXFText();
    const pairs=C.parseDXFPairs(out); const re=C.parseDXFEntities(pairs);
    ok(re.entities.length===2,'왕복 후 엔티티 2개 유지');
    ok(out.includes('AC1021'),'버전 AC1021(UTF-8)');
    ok(out.includes('치수'),'한글 레이어명 UTF-8 보존'); }

  group('링크 공유 — 인코딩 왕복');
  { // 동기 컨텍스트에서 async 검증: 완료 후 요약 갱신
    const original='WebCAD 공유 테스트 — 한글/기호 ⌀°± {}[]';
    C.shareEncode(original).then(enc => {
      record(typeof enc==='string' && enc.length>1, '공유 인코딩 생성 ('+(enc[0]==='g'?'gzip':'raw')+')');
      return C.shareDecode(enc);
    }).then(dec => {
      record(dec===original, '공유 디코딩 = 원본 (한글·기호 보존)');
      // 실제 도면 payload 왕복
      C.reset(); C.state.entities=[{id:1,type:'CIRCLE',cx:1,cy:2,r:3}];
      return C.shareEncode(C.drawingPayload());
    }).then(enc2 => C.shareDecode(enc2)).then(json => {
      const d=JSON.parse(json);
      record(d.entities.length===1 && d.entities[0].r===3, '도면 payload 왕복 (원 r=3 유지)');
      finishAsync();
    }).catch(e => { record(false, '공유 왕복 오류: '+e.message); finishAsync(); });
  }

  group('SVG 내보내기');
  { setEnts([{type:'CIRCLE',cx:0,cy:0,r:10},{type:'LINE',x1:0,y1:0,x2:10,y2:10}]);
    const svg=C.buildSVG();
    ok(svg.startsWith('<svg'),'SVG 시작 태그');
    ok(svg.includes('<circle')&&svg.includes('<line'),'circle·line 포함');
    ok(svg.includes('viewBox'),'viewBox 존재'); }

  group('레이어 잠금');
  { reset(); S0.layers=[{name:'0',color:'#fff',visible:true},{name:'L',color:'#f00',visible:true,locked:true}];
    ok(C.isLocked({layer:'L'}),'잠긴 레이어 도형 = locked');
    ok(!C.isLocked({layer:'0'}),'일반 레이어 = 미잠금'); }

  group('그리기 순서(front/back)');
  { setEnts([{type:'LINE',x1:0,y1:0,x2:1,y2:0},{type:'CIRCLE',cx:0,cy:0,r:1},{type:'ARC',cx:0,cy:0,r:1,startAngle:0,endAngle:90}]);

  group('3D 불리언 — winding 무관 정합 (CW/CCW 혼합)');
  { // 부호 부피(테트라 합) — winding 일관 시 |vol|=실제 부피
    const meshVol = (tris) => { let v=0; for(const t of tris){ const[a,b,c]=t;
      v += (a[0]*(b[1]*c[2]-c[1]*b[2]) - a[1]*(b[0]*c[2]-c[0]*b[2]) + a[2]*(b[0]*c[1]-c[0]*b[1]))/6; } return v; };
    // base: (0,0)~(1000,1000) CCW / cutter: (500,500)~(1500,1500) CW(반대 winding). 둘 다 h=1000, 겹침 500³=2.5e8
    const mk = (pts) => ({ type:'LWPOLYLINE', closed:true, points:pts, layer:'0', bim:{kind:'column', base:0, h:1000} });
    const baseP=[[0,0],[1000,0],[1000,1000],[0,1000]];             // CCW
    const cutP =[[500,500],[500,1500],[1500,1500],[1500,500]];     // CW (일부러 반대)
    // 차집합: base − cutter = 1e9 − 2.5e8 = 7.5e8
    setEnts([mk(baseP), mk(cutP)]);
    C.runBoolean('subtract', [S0.entities[0]], [S0.entities[1]]);
    let m = S0.entities.find(e=>e.type==='MESH');
    ok(!!m, '차집합 결과 메시 생성');
    if(m) eq(Math.abs(meshVol(m.tris)), 7.5e8, '차집합 부피 = base − 겹침 (winding 반대여도)', 1e6);
    // 교집합: 겹침 = 2.5e8
    setEnts([mk(baseP), mk(cutP)]);
    C.runBoolean('intersect', [S0.entities[0]], [S0.entities[1]]);
    m = S0.entities.find(e=>e.type==='MESH');
    if(m) eq(Math.abs(meshVol(m.tris)), 2.5e8, '교집합 부피 = 겹침 (winding 반대여도)', 1e6);
    // 합집합: 1e9 + 1e9 − 2.5e8 = 1.75e9
    setEnts([mk(baseP), mk(cutP)]);
    C.runBoolean('union', [S0.entities[0]], [S0.entities[1]]);
    m = S0.entities.find(e=>e.type==='MESH');
    if(m) eq(Math.abs(meshVol(m.tris)), 1.75e9, '합집합 부피 = 두 상자 − 겹침 (winding 반대여도)', 1e6);
  }

  group('이미지 — 회전 기하 / 검볼 / 라이노 공통 명령');
  {
    const mkImg = (o={}) => { setEnts([{type:'IMAGE',layer:'0',x:0,y:0,w:100,h:60,src:'',...o}]); return S0.entities[0]; };

    // 기하 헬퍼
    let im = mkImg();
    let ctr = C.imgCenter(im);
    ok(near(ctr.x,50) && near(ctr.y,30), 'imgCenter = 중심');
    eqi(C.entityGrips(im).length, 4, '이미지 그립 = 네 모서리');
    // 회전 0: 모서리는 축 정렬
    let cs = C.imgCorners(im);
    ok(near(cs[0].x,0)&&near(cs[0].y,0)&&near(cs[2].x,100)&&near(cs[2].y,60), '회전 0 → 모서리 = 원래 사각형');
    // 로컬↔월드 왕복
    im.rot = 37;
    const wpt = C.imgWorld(im, 12, -8), lpt = C.imgLocal(im, wpt);
    ok(near(lpt.u,12,1e-9) && near(lpt.v,-8,1e-9), 'imgWorld ↔ imgLocal 왕복 일치(회전 37°)');

    // 회전 반영 히트 판정
    im = mkImg({ rot: 90 });
    ctr = C.imgCenter(im);
    ok(C.entityHit(im, {x:ctr.x, y:ctr.y+45}, 0), '90° 회전 → 세로로 길어진 쪽(중심+45)은 안쪽');
    ok(!C.entityHit(im, {x:ctr.x+45, y:ctr.y}, 0), '90° 회전 → 가로 45는 바깥 (회전 무시하면 실패)');

    // bbox도 회전 반영
    im = mkImg({ rot: 90 });
    let bb = C.entityBBox(im);
    ok(near(bb.xmax-bb.xmin, 60) && near(bb.ymax-bb.ymin, 100), '회전 90° bbox = 폭·높이 교환');

    // 라이노 공통 명령이 이미지에 적용 (전용 3D/이미지 명령 없이)
    im = mkImg();
    C.translateEntity(im, 10, 5);
    ok(near(im.x,10) && near(im.y,5), 'move(translateEntity) → 이미지 이동');
    im = mkImg();
    C.applyTransform(im, C.T_rotate(50, 30, 40));
    ok(near(im.rot,40) && near(C.imgCenter(im).x,50) && near(C.imgCenter(im).y,30), 'rotate → rot 누적 + 중심 보존');
    im = mkImg({ rot: 30 });
    C.applyTransform(im, C.T_mirror(50,30,50,40)); // 수직축
    ok(im.flip === true && near(im.rot, 150), 'mirror → 좌우반전 + 회전 반사(2*90-30)');
    im = mkImg();
    C.scaleEntities([im], {x:50,y:30}, 2);
    ok(near(im.w,200) && near(im.h,120) && near(C.imgCenter(im).x,50), 'scale 2배 → 중심 기준 확대');

    // 검볼 히트 판정 (선택 1개 & IMAGE일 때만)
    im = mkImg();
    S0.tool = 'select'; S0.selection.clear(); S0.selection.add(im.id);
    ok(!!C.gumballImage(), '이미지 1개 선택 → 검볼 대상');
    const gs = C.worldToScreen(50, 30);
    eqi(C.imgGumHit({x:gs.x+40, y:gs.y}), 'x', '검볼 X축 히트');
    eqi(C.imgGumHit({x:gs.x, y:gs.y-40}), 'y', '검볼 Y축 히트');
    eqi(C.imgGumHit({x:gs.x, y:gs.y}), 'free', '검볼 중심 = 자유 이동');
    eqi(C.imgGumHit({x:gs.x+78, y:gs.y}), 'sx', '검볼 X 배율 사각');
    eqi(C.imgGumHit({x:gs.x+46*Math.cos(Math.PI/4), y:gs.y-46*Math.sin(Math.PI/4)}), 'rot', '검볼 회전 원호');
    eqi(C.imgGumHit({x:gs.x+300, y:gs.y+300}), null, '검볼 밖 = null (평소 선택 동작)');
    S0.selection.clear();
    eqi(C.gumballImage(), null, '선택 없음 → 검볼 없음');

      { id:3, type:'LWPOLYLINE', closed:true, points:[[0,0],[10,0],[10,10]], layer:'Furniture', lv:0 },
      { id:4, type:'LINE', x1:1,y1:1,x2:5,y2:5, layer:'가구-갈색', lv:0 },

    ok(C.dxfColorIndex('#8b4513') !== 7, 'ACI: 갈색이 7로 뭉개지지 않음');

    // 소유자 330 — 심볼 테이블/레코드 모두

    ok(!layerSeg.includes('390\nF'), '끊어진 플롯스타일 핸들(390 F) 제거됨');

    const beforeEnts = S0.entities.map(e => `${e.type}@${e.layer}`).sort().join('|');
    C.loadDXF(dxf, 'rt.dxf');

    eqi(after, before, 'DXF 왕복 — 레이어 이름·색·가시성 100% 보존');
    eqi(afterEnts, beforeEnts, 'DXF 왕복 — 엔티티의 레이어 소속 보존');
    const ec = S0.entities.find(e => e.color);

  // ---------- 표면 스냅 + 표면 위 곡선(정점별 z) ----------
  group('표면 스냅 — 솔리드/메시 면 위에 커서 얹기 + 표면 위 곡선');
  {
    // catmullRom2D 일반화: 2D 입력은 예전과 동일, 3D 입력은 z까지 보간
    const P2 = [[0,0],[10,10],[20,0],[30,10]];
    const s2 = C.catmullRom2D(P2, false, 4);
    ok(s2.every(p => p.length === 2), 'catmullRom 2D 입력 → 2D 출력 (기존 동작 유지)');
    const P3 = [[0,0,0],[10,10,100],[20,0,200],[30,10,300]];
    const s3 = C.catmullRom2D(P3, false, 4);
    ok(s3.every(p => p.length === 3), 'catmullRom 3D 입력 → z까지 보간');
    ok(s3.some(p => p[2] > 0 && p[2] < 300), '  z가 중간값으로 부드럽게 보간됨');
    // 2D 결과가 3D 입력의 x·y와 같아야 (z 추가가 x·y를 바꾸면 안 됨)
    ok(s2.every((p,i) => Math.abs(p[0]-s3[i][0]) < 1e-9 && Math.abs(p[1]-s3[i][1]) < 1e-9), '  z를 추가해도 x·y 궤적 불변');

    // polyZ / polyHasZ — 정점 수가 어긋나면 조용히 평면 z로 폴백
    const e1 = { type:'LWPOLYLINE', points:[[0,0],[1,1],[2,2]], zs:[10,20,30] };
    ok(C.polyHasZ(e1), 'zs 길이가 맞으면 정점별 높이 사용');
    eqi(C.polyZ(e1, 1, 5), 20, '  polyZ = 해당 정점의 z');
    const e2 = { type:'LWPOLYLINE', points:[[0,0],[1,1],[2,2]], zs:[10,20] }; // 오프셋 등으로 어긋난 경우
    ok(!C.polyHasZ(e2), 'zs 길이가 어긋나면 무시 (깨지지 않고 평면으로 폴백)');
    eqi(C.polyZ(e2, 1, 5), 5, '  폴백 = 평면 z');
    const e3 = { type:'LWPOLYLINE', points:[[0,0],[1,1]] };
    eqi(C.polyZ(e3, 0, 7), 7, 'zs 없는 기존 폴리라인 = 평면 z (하위호환)');

    // attachPtsZ — 높이가 다를 때만 zs를 심는다
    const flat = { type:'LWPOLYLINE', points:[[0,0],[1,1]] };
    C.attachPtsZ(flat, [{x:0,y:0,z:C.lvElev()},{x:1,y:1,z:C.lvElev()}]);
    ok(flat.zs === undefined, '높이가 모두 같으면 zs를 만들지 않음 (기존 평면 도형 그대로)');
    const slope = { type:'LWPOLYLINE', points:[[0,0],[1,1]] };
    C.attachPtsZ(slope, [{x:0,y:0,z:100},{x:1,y:1,z:500}]);
    ok(!!slope.zs && slope.zs.length === 2, '높이가 다르면 zs 저장 (표면 위 곡선)');
    ok(slope.zo === undefined, '  zs와 zo는 함께 쓰지 않음 (이중 적용 방지)');

    // DXF 왕복에서 zs 보존
    setEnts([{ type:'LWPOLYLINE', closed:false, points:[[0,0],[100,0],[200,0]], zs:[0,500,200], layer:'0' }]);
    const dxf = C.buildDXFText();
    C.loadDXF(dxf, 'rt.dxf');
    const back = S0.entities.find(e => e.type === 'LWPOLYLINE');
    ok(!!back && JSON.stringify(back.zs) === JSON.stringify([0,500,200]), 'DXF 왕복 — 표면 위 곡선의 정점별 높이 보존');
    reset();
  }

  // ---------- 표면 위 곡선을 따라 쓸기(sweep) ----------
  group('sweep — 표면 위 곡선(zs)을 경로로 사용');
  {
    // 1) crvSampleN이 표면 곡선의 실제 높이를 내놓아야 (예전엔 zo만 봐서 z=0으로 깔림)
    const rail = { type:'LWPOLYLINE', closed:false, points:[[0,0],[100,0],[200,0]], zs:[1000,1500,1000], layer:'0' };
    const smp = C.crvSampleN(rail, 4);
    ok(smp.every(p => p[2] >= 1000), '표면 곡선 샘플의 z가 실제 높이 (바닥 z=0으로 깔리지 않음)');
    ok(smp.some(p => p[2] > 1200), '  중간 지점의 z가 보간됨');
    const flatRail = { type:'LWPOLYLINE', closed:false, points:[[0,0],[100,0],[200,0]], layer:'0' };
    ok(C.crvSampleN(flatRail, 4).every(p => p[2] === 0), 'zs 없는 평면 곡선은 예전대로 z=0 (하위호환)');
    const zoRail = { type:'LWPOLYLINE', closed:false, points:[[0,0],[100,0]], zo: 300, layer:'0' };
    ok(C.crvSampleN(zoRail, 2).every(p => p[2] === 300), 'zo(검볼로 띄운 높이)도 예전대로 동작');

    // 2) 실제 sweep — 경로 높이를 따라가는가
    const W = document.getElementById('app').contentWindow; // 분할 수 프롬프트 대체
    const oldPrompt = W.prompt; W.prompt = () => '16';
    setEnts([
      { type:'LWPOLYLINE', closed:false, points:[[0,0],[500,0],[1000,0]], zs:[1000,1600,1000], layer:'0' }, // 레일(표면 위)
      { type:'LWPOLYLINE', closed:true, points:[[0,0],[40,0],[40,40],[0,40]], layer:'0' },                   // 단면
    ]);
    S0.selection.clear(); S0.selection.add(1); S0.selection.add(2);
    C.cmdSweep();
    const m = S0.entities.find(e => e.type === 'MESH');
    ok(!!m, 'sweep 메시 생성');
    if (m) {
      let zmin = 1e18, zmax = -1e18;
      for (const t of m.tris) for (const p of t) { zmin = Math.min(zmin, p[2]); zmax = Math.max(zmax, p[2]); }
      ok(zmin >= 900, `쓸기 결과가 바닥에 깔리지 않음 (zmin=${Math.round(zmin)})`);
      ok(zmax > 1500, `쓸기 결과가 경로 높이를 따라감 (zmax=${Math.round(zmax)})`);
    }
    W.prompt = oldPrompt;
    reset();
  }

  // ---------- 곡선을 따라 벽 세우기 ----------
  group('wall — 표면 위 곡선/3D 선을 따라 세우기 (바닥이 지형을 탐)');
  {
    // 평면 벽은 예전 그대로 (zb/zt 없이 평평한 프리즘)
    setEnts([{ type:'LINE', x1:0, y1:0, x2:5000, y2:0, layer:'0', bim:{kind:'wall', h:3000, t:200, base:0} }]);
    let sol = C.bimSolids();
    eqi(sol.length, 1, '평면 벽 = 밴드 1개');
    eq(sol[0].z0, 0, '  바닥 0'); eq(sol[0].z1, 3000, '  상단 3000');
    ok(sol[0].zb === undefined && sol[0].zt === undefined, '  평면 벽엔 정점별 z 없음 (기존 동작 유지)');

    // 표면 위 곡선(zs) 벽 — 바닥이 곡선을 따라가고 높이는 어디서나 동일
    setEnts([{ type:'LWPOLYLINE', closed:false, points:[[0,0],[2000,0],[4000,0]], zs:[0,800,1500], layer:'0',
               bim:{kind:'wall', h:3000, t:200, base:0} }]);
    sol = C.bimSolids();
    eqi(sol.length, 2, '곡선 벽 = 세그먼트마다 밴드');
    ok(sol.every(s => !!s.zb && !!s.zt), '  모든 밴드에 정점별 바닥·상단');
    ok(sol.every(s => s.zb.every((b, i) => Math.abs((s.zt[i] - b) - 3000) < 1e-6)), '  벽 높이가 어디서나 3000 (기울어져도 균일)');
    eq(sol[0].zb[0], 0, '  1구간 시작 바닥 = 곡선 z(0)');
    eq(sol[0].zb[1], 800, '  1구간 끝 바닥 = 곡선 z(800)');
    eq(sol[1].zb[1], 1500, '  2구간 끝 바닥 = 곡선 z(1500)');
    ok(sol.every(s => Math.abs(s.z0 - Math.min(...s.zb)) < 1e-6 && Math.abs(s.z1 - Math.max(...s.zt)) < 1e-6),
       '  스칼라 z0/z1이 min(zb)/max(zt)로 유효 (fit·검볼·단면 등 나머지 코드 안전)');

    // 3D 선(z1/z2)도 경로로 동작
    setEnts([{ type:'LINE', x1:0, y1:0, x2:6000, y2:0, z1:0, z2:1200, layer:'0', bim:{kind:'wall', h:3000, t:200, base:0} }]);
    sol = C.bimSolids();
    ok(sol[0].zb && Math.abs(sol[0].zb[0] - 0) < 1 && Math.abs(sol[0].zb[1] - 1200) < 1, '3D 선(z1/z2) 벽도 바닥이 기울어짐');

    // 경사 벽 위의 창 — 개구부도 같이 기울고, 씰 높이가 지역 바닥 기준으로 유지
    setEnts([
      { type:'LINE', x1:0, y1:0, x2:6000, y2:0, z1:0, z2:1200, layer:'0', bim:{kind:'wall', h:3000, t:200, base:0} },
      { type:'LINE', x1:2400, y1:0, x2:3600, y2:0, layer:'0', bim:{kind:'opening', ot:'window', h:1200, sill:900} },
    ]);
    sol = C.bimSolids();
    const glass = sol.find(s => s.glass);
    ok(!!glass, '경사 벽에도 창(유리) 생성');
    ok(glass && glass.zb[0] !== glass.zb[1], '  유리도 지형을 따라 기울어짐');
    ok(glass && Math.abs((glass.zt[0] - glass.zb[0]) - 1200) < 1, '  창 높이 1200 유지');
    ok(sol.every(s => !!s.zb), '  개구부 앞/아래/인방 밴드 전부 기울어짐');

    // bim.base = 지형에서 들어올리는 오프셋으로 계속 동작
    setEnts([{ type:'LWPOLYLINE', closed:false, points:[[0,0],[2000,0]], zs:[0,500], layer:'0',
               bim:{kind:'wall', h:2000, t:200, base:300} }]);
    sol = C.bimSolids();
    eq(sol[0].zb[0], 300, 'base=300 → 곡선 위로 300 들어올림');
    eq(sol[0].zb[1], 800, '  끝점도 곡선(500)+300');
    reset();
  }

  // ---------- 곡선 위 계단 ----------
  group('stair — 곡선 경로 (L자·아치형) + 표면 위 곡선');
  {
    // 직선 계단은 예전 공식과 100% 같아야 (회귀)
    const straight = { type:'LINE', x1:0, y1:0, x2:4000, y2:0, layer:'0', bim:{kind:'stair', w:1200, h:3000, riser:180, base:0} };
    setEnts([straight]);
    const got = C.stairSolids(S0.entities[0]);
    const oldImpl = (e) => { // 곡선 지원 전의 구현
      const b=e.bim, base=b.base||0, h=b.h||0, w=b.w||1200;
      const L=Math.hypot(e.x2-e.x1, e.y2-e.y1); if (L<1e-6||h<=0) return [];
      const n=Math.max(1,Math.ceil(h/(b.riser||180)));
      const ux=(e.x2-e.x1)/L, uy=(e.y2-e.y1)/L, nx=-uy*w/2, ny=ux*w/2, o=[];
      for(let i=0;i<n;i++){ const s0=L*i/n, s1=L*(i+1)/n;
        const ax=e.x1+ux*s0, ay=e.y1+uy*s0, bx=e.x1+ux*s1, by=e.y1+uy*s1;
        o.push({poly:[[ax+nx,ay+ny],[bx+nx,by+ny],[bx-nx,by-ny],[ax-nx,ay-ny]], z0:base, z1:base+h*(i+1)/n}); }
      return o;
    };
    const want = oldImpl(S0.entities[0]);
    eqi(got.length, want.length, '직선 계단 단 수가 예전과 동일');
    let maxd = 0;
    for (let i=0;i<Math.min(got.length,want.length);i++){
      maxd = Math.max(maxd, Math.abs(got[i].z0-want[i].z0), Math.abs(got[i].z1-want[i].z1));
      for (let k=0;k<4;k++) for (let d=0;d<2;d++) maxd = Math.max(maxd, Math.abs(got[i].poly[k][d]-want[i].poly[k][d]));
    }
    ok(maxd < 1e-6, `직선 계단 기하가 예전과 동일 (최대 오차 ${maxd.toExponential(1)})`);

    // L자 곡선 계단 — 각 단이 그 지점 진행방향에 직교
    setEnts([{ type:'LWPOLYLINE', closed:false, points:[[0,0],[3000,0],[3000,3000]], layer:'0',
               bim:{kind:'stair', w:1200, h:3000, riser:180, base:0} }]);
    const Lsol = C.stairSolids(S0.entities[0]);
    ok(Lsol.length > 1, 'L자 곡선 계단 생성');
    const f = Lsol[0].poly, l = Lsol[Lsol.length-1].poly;
    const wF = [f[0][0]-f[3][0], f[0][1]-f[3][1]], wL = [l[0][0]-l[3][0], l[0][1]-l[3][1]];
    ok(Math.abs(wF[0]) < 1 && Math.abs(wF[1]-1200) < 1, '  +X 진행 구간: 디딤판 폭이 Y방향');
    ok(Math.abs(wL[1]) < 1 && Math.abs(wL[0]+1200) < 1, '  +Y 진행 구간: 디딤판 폭이 X방향 (곡선 따라 회전)');
    const zsL = Lsol.map(s=>s.z1), dL = zsL.map((z,i)=> i ? z-zsL[i-1] : z-Lsol[0].z0);
    ok(Math.max(...dL)-Math.min(...dL) < 1e-6, '  단높이 균일 (건축 기본)');
    eq(Lsol[Lsol.length-1].z1, 3000, '  꼭대기 = base+h');

    // 표면 위 곡선 — 곡선의 시작·끝 높이를 계단 높이로 (bim.h는 무시), 단높이는 균일
    setEnts([{ type:'LWPOLYLINE', closed:false, points:[[0,0],[2000,0],[4000,0]], zs:[500,900,2300], layer:'0',
               bim:{kind:'stair', w:1200, h:9999, riser:180, base:0} }]);
    const Ssol = C.stairSolids(S0.entities[0]);
    ok(Ssol.length > 1, '표면 위 곡선 계단 생성');
    eq(Ssol[0].z0, 500, '  발밑 = 곡선 시작 높이');
    eq(Ssol[Ssol.length-1].z1, 2300, '  꼭대기 = 곡선 끝 높이 (bim.h 9999 무시)');
    const zsS = Ssol.map(s=>s.z1), dS = zsS.map((z,i)=> i ? z-zsS[i-1] : z-Ssol[0].z0);
    ok(Math.max(...dS)-Math.min(...dS) < 1e-6, '  지형을 타도 단높이는 균일');

    // 평면 폴리라인(z 없음)은 bim.base/h 그대로
    setEnts([{ type:'LWPOLYLINE', closed:false, points:[[0,0],[2000,0],[4000,1000]], layer:'0',
               bim:{kind:'stair', w:1200, h:1800, riser:180, base:100} }]);
    const Fsol = C.stairSolids(S0.entities[0]);
    eq(Fsol[0].z0, 100, '평면 곡선 계단: 발밑 = bim.base');
    eq(Fsol[Fsol.length-1].z1, 1900, '  꼭대기 = base+h');

    // bimSolids 디스패치 (폴리라인 계단이 3D에 실제로 나오는가)
    ok(C.bimSolids().filter(s => s.eid === 1).length > 1, '폴리라인 계단이 bimSolids에 포함됨');
    reset();
  }

  // ---------- 곡선 위 난간 ----------
  group('railing — 곡선/표면 위 곡선을 따라 손스침 + 동자기둥');
  {
    const rails = sol => sol.filter(s => s.zb);   // 손스침 밴드에만 정점별 z가 있음
    const posts = sol => sol.filter(s => !s.zb);

    // 직선 난간: 손스침 1구간 + 간격대로 기둥
    setEnts([{ type:'LINE', x1:0, y1:0, x2:6000, y2:0, layer:'0',
               bim:{kind:'railing', h:1100, t:50, postT:60, spacing:1200, base:0} }]);
    let sol = C.railingSolids(S0.entities[0]);
    eqi(rails(sol).length, 1, '직선 난간: 손스침 1구간');
    eqi(posts(sol).length, 6, '  기둥 6개 (6000 ÷ 1200 = 5구간 → 양 끝 포함 6)');
    eq(rails(sol)[0].z0, 1050, '  손스침 아랫면 = h - t');
    eq(rails(sol)[0].z1, 1100, '  손스침 윗면 = h');
    eq(posts(sol)[0].z0, 0, '  기둥 발밑 = base');
    eq(posts(sol)[0].z1, 1050, '  기둥 머리 = 손스침 아래');

    // 표면 위 곡선: 손스침이 곡선을 따라 기울고 두께는 일정, 기둥은 지형에 발을 붙임
    setEnts([{ type:'LWPOLYLINE', closed:false, points:[[0,0],[2000,0],[4000,0]], zs:[0,600,1500], layer:'0',
               bim:{kind:'railing', h:1100, t:50, postT:60, spacing:1000, base:0} }]);
    sol = C.railingSolids(S0.entities[0]);
    eqi(rails(sol).length, 2, '곡선 난간: 세그먼트마다 손스침');
    ok(rails(sol).every(s => s.zb[0] !== s.zb[1]), '  손스침이 곡선을 따라 기울어짐');
    ok(rails(sol).every(s => s.zt.every((z, i) => Math.abs((z - s.zb[i]) - 50) < 1e-6)), '  손스침 두께 50 일정');
    eq(rails(sol)[0].zb[0], 1050, '  시작 손스침 = 곡선(0) + h - t');
    eq(rails(sol)[1].zt[1], 2600, '  끝 손스침 윗면 = 곡선(1500) + h');
    ok(posts(sol).every(p => Math.abs((p.z1 - p.z0) - 1050) < 1e-6), '  기둥은 전부 같은 길이(지형에서 손스침까지)');
    ok(posts(sol).some(p => p.z0 > 0), '  기둥 발밑이 지형을 따라 올라감');

    // 닫힌 폴리라인 = 발코니 난간
    setEnts([{ type:'LWPOLYLINE', closed:true, points:[[0,0],[3000,0],[3000,2000],[0,2000]], layer:'0',
               bim:{kind:'railing', h:1200, t:50, postT:60, spacing:1000, base:3000} }]);
    sol = C.railingSolids(S0.entities[0]);
    eqi(rails(sol).length, 4, '발코니(닫힌 폴리라인): 손스침 4구간으로 한 바퀴');
    eq(rails(sol)[0].z0, 4150, '  base 3000 위에 얹힘 (3000 + 1200 - 50)');

    // 원형 난간
    setEnts([{ type:'CIRCLE', cx:0, cy:0, r:2000, layer:'0',
               bim:{kind:'railing', h:1100, t:50, postT:60, spacing:1500, base:0} }]);
    sol = C.railingSolids(S0.entities[0]);
    eqi(rails(sol).length, 32, '원형 난간: 32각형으로 한 바퀴');
    ok(posts(sol).length >= 6, '  둘레를 따라 기둥 배치');

    // bimSolids 디스패치 + 3D 반영
    setEnts([{ type:'LINE', x1:0, y1:0, x2:3000, y2:0, layer:'0',
               bim:{kind:'railing', h:1100, t:50, postT:60, spacing:1000, base:0} }]);
    ok(C.bimSolids().filter(s => s.eid === 1).length > 1, '난간이 bimSolids(3D)에 포함됨');

    // 명령어 — 라이노처럼 이름/별칭 해석
    eqi(C.CMD_ALIASES['railing'], 'railing', "'railing' 명령 등록");
    eqi(C.CMD_ALIASES['난간'], 'railing', "  한글 별칭 '난간'");
    eqi(C.CMD_ALIASES['handrail'], 'railing', "  별칭 'handrail'");
    ok(!!C.INSTANT_CMDS['railing'], '  railing이 실행 가능한 명령');
    reset();
  }

  // ---------- 광원 지정 (light) ----------
  group('light — 개체에 광원 특성만 얹는다 (형태·색·정체 그대로)');
  {
    // ★ 핵심: box는 MESH가 아니라 'LWPOLYLINE + bim{kind:column}'이다.
    //   광원 지정이 bim을 덮어쓰면 정육면체라는 정보가 지워져 형상이 통째로 사라진다.
    setEnts([{ type:'LWPOLYLINE', closed:true, layer:'0', color:'#3388ff',
               points:[[0,0],[600,0],[600,600],[0,600]], bim:{kind:'column', h:600, base:2400} }]);
    let e = S0.entities[0];
    S0.selection.clear(); S0.selection.add(e.id);
    C.INSTANT_CMDS['setaslight']();
    e = S0.entities[0];
    ok(!!e.lightId && !!C.lightOfEnt(e), '광원 지정됨 (e.lightId 참조 + state.lights 컬렉션)');
    eqi(S0.lights.length, 1, '  광원 속성은 개체가 아니라 컬렉션에 산다');
    eqi(C.lightOfEnt(e).objectId, e.id, '  광원이 개체를 가리킨다');
    eqi(C.lightOfEnt(e).intensity, 800, '  기본 800lm');
    eqi(C.lightOfEnt(e).colorTemp, 3000, '  기본 3000K');
    eqi(C.lightOfEnt(e).type, 'emissive', '  기본 타입 = 발광면(개체 그대로)');
    eqi(e.bim.kind, 'column', '  BIM 정체 그대로 — 여전히 기둥(정육면체)');
    eq(e.bim.h, 600, '  높이 그대로');
    eqi(e.color, '#3388ff', '  색 그대로 (발광색으로 덮어쓰지 않는다)');
    ok(C.bimSolids().filter(s => s.eid === e.id).length > 0, '  3D 형상이 사라지지 않는다 ★사용자 보고 버그');
    ok(C.bimSolids().filter(s => s.eid === e.id).every(s => s.lit), '  형상 안에 빛 → 양면 조명 표시');

    // 발광 지점 = 정육면체 한가운데
    let em = C.lightEmitters(e);
    eqi(em.length, 1, '정육면체 → 발광 지점 1개');
    eq(em[0].x, 300, '  x = 형상 한가운데');
    eq(em[0].y, 300, '  y = 형상 한가운데');
    eq(em[0].z, 2700, '  z = base+h/2 = 형상 한가운데');

    // unsetlight = 해제, 형상은 그대로
    C.INSTANT_CMDS['unsetlight']();
    e = S0.entities[0];
    ok(!e.lightId && S0.lights.length === 0, 'unsetlight → 광원 해제');
    eqi(e.bim.kind, 'column', '  해제해도 형상은 그대로');

    // 원 = 중심 점광원 (bim 없는 순수 곡선)
    setEnts([{ type:'CIRCLE', cx:1000, cy:2000, r:150, layer:'0', zo:2600, light:{} }]);
    em = C.lightEmitters(S0.entities[0]);
    eqi(em.length, 1, '원 → 발광 지점 1개 (점광원)');
    eq(em[0].z, 2600, '  z = 개체가 놓인 높이(zo)');

    // 선 = 선형 광원
    setEnts([{ type:'LINE', x1:0, y1:0, x2:9000, y2:0, layer:'0', light:{spacing:3000} }]);
    eqi(C.lightEmitters(S0.entities[0]).length, 4, '선 9000 / 간격 3000 → 발광 지점 4개');

    // 3D 선(z1/z2) — 정점 z를 따라간다
    setEnts([{ type:'LINE', x1:0, y1:0, x2:1000, y2:0, z1:500, z2:1500, layer:'0', light:{spacing:1000} }]);
    em = C.lightEmitters(S0.entities[0]);
    eq(em[0].z, 500, '3D 선: 시작점 z');
    eq(em[em.length-1].z, 1500, '  끝점 z');

    // 메시 = 형상 한가운데
    setEnts([{ type:'MESH', layer:'0', light:{}, tris:[
      [[0,0,1000],[200,0,1000],[0,200,1000]],
      [[0,0,1400],[200,0,1400],[0,200,1400]],
    ] }]);
    em = C.lightEmitters(S0.entities[0]);
    eq(em[0].z, 1200, '메시 → z = 형상 한가운데 (1000~1400)');

    // 저장/복원 (WCX) — light가 실려야 저장했다 열 때 광원이 남는다
    setEnts([{ type:'LWPOLYLINE', closed:true, layer:'0', points:[[0,0],[600,0],[600,600],[0,600]],
               bim:{kind:'column', h:600, base:0}, light:{intensity:2400, colorTemp:4000} }]);
    const dxf = C.buildDXFText();
    ok(/"lights"/.test(dxf), 'WCX 저장에 lights 컬렉션 포함 — 없으면 저장했다 열 때 광원이 사라진다');
    ok(/"lightId"/.test(dxf), '  개체의 광원 참조(lightId)도 저장');
    ok(/"intensity":2400/.test(dxf) && /"colorTemp":4000/.test(dxf), '  세기(lm)·색온도(K)도 함께 저장');

    // 명령어
    eqi(C.CMD_ALIASES['setaslight'], 'setaslight', "'setaslight' 명령 등록");
    eqi(C.CMD_ALIASES['unsetlight'], 'unsetlight', "'unsetlight' 명령 등록");
    eqi(C.CMD_ALIASES['light'], 'setaslight', "  옛 'light' → setaslight 로 이어짐");
    eqi(C.CMD_ALIASES['광원지정'], 'setaslight', "  한글 별칭 '광원지정'");
    // 켈빈 → RGB
    const k22 = C.kelvinToRGB(2200), k80 = C.kelvinToRGB(8000);
    ok(k22[0] > k22[2], '색온도 2200K는 붉다 (R>B)');
    ok(k80[2] >= k80[0], '  8000K는 푸르다 (B≥R)');
    eq(C.lmToPower(800), 1, '  800lm = 내부 밝기 1 (단위 환산은 한 곳에)');
    eq(C.lmToPower(1600), 2, '  1600lm = 2');
    reset();
  }

  // ---------- 조명 조각의 내부 이음선 ----------
  group('조명 세분화 — 면 위에 격자가 생기지 않아야 (fe = 진짜 모서리만 그림)');
  {
    if (!C.v3) C.INSTANT_CMDS['view3d']();
    const V3 = C.v3;
    setEnts([
      { type:'LWPOLYLINE', closed:true, layer:'0', points:[[-6000,-6000],[6000,-6000],[6000,6000],[-6000,6000]],
        bim:{kind:'slab', t:100, top:0} },
      { type:'CIRCLE', cx:0, cy:0, r:100, layer:'0', zo:2800, light:{} },
    ]);
    V3.lighting = true; V3._fast = false;
    V3.solids = C.bimSolids();
    V3._lights = C.lightSources();
    V3._occ = C.shadowOccluders();
    V3._bounce = null;
    V3._litCache = new Map(); V3._litBudget = 1200;
    const faces = [];
    const slab = V3.solids.find(s => s.eid === 1);
    const zt = slab.poly.map(() => slab.z1);
    C.pushLitPoly(faces, slab.poly, zt, 1, { color: slab.color, eid: slab.eid, fk: 'top' }, 'K1', false);

    ok(faces.length > 4, '넓은 상면이 여러 조각으로 나뉨 (' + faces.length + '조각)');
    ok(faces.every(f => f.fe && f.fe.length === 3), '  조각마다 fe(진짜 모서리 표시)를 가진다');
    ok(faces.every(f => f.sub === 1), '  조각에 sub 표시 (이음선 판정을 밝기 대신 면 종류로 묶기 위함)');
    const drawn = faces.reduce((a, f) => a + f.fe.filter(Boolean).length, 0);
    const total = faces.length * 3;
    ok(drawn < total * 0.5, '  대부분의 변은 내부선으로 걸러짐 — 이게 안 되면 면에 격자가 생긴다 (' + drawn + '/' + total + ')');
    ok(drawn > 0, '  그래도 외곽선은 남는다 (면이 윤곽을 통째로 잃으면 안 됨)');

    // 외곽선으로 표시된 변은 반드시 원래 다각형의 둘레 위에 있어야 한다 (캐시된 조각의 월드좌표로 검사)
    const frags = V3._litCache.get('K1');
    ok(!!frags && frags.length === faces.length, '  캐시에 조각의 월드좌표가 남는다');
    const onRim = p => Math.abs(Math.abs(p[0]) - 6000) < 1e-6 || Math.abs(Math.abs(p[1]) - 6000) < 1e-6;
    let wrong = 0, rim = 0;
    for (const fr of frags) {
      const V = [fr.a, fr.b, fr.c];
      for (let i = 0; i < 3; i++) {
        if (!fr.fe[i]) continue;
        rim++;
        const p = V[i], q = V[(i + 1) % 3];
        if (!(onRim(p) && onRim(q))) wrong++; // 외곽선인데 둘레 위가 아니면 잘못 표시된 것
      }
    }
    eqi(wrong, 0, '  외곽선 표시된 변은 전부 실제 둘레 위에 있다 (' + rim + '개 검사)');
    V3.lighting = false; V3._lights = null; V3._occ = null; V3._litCache = new Map();
    reset();
  }

  // ---------- 광원 속성 패널 (Phase 3) ----------
  group('광원 속성 — 슬라이더 실시간 · 다중 일괄 · undo 오염 방지');
  {
    setEnts([
      { type:'LWPOLYLINE', closed:true, layer:'0', points:[[0,0],[240,0],[240,240],[0,240]], bim:{kind:'column',h:80,base:2550} },
      { type:'LWPOLYLINE', closed:true, layer:'0', points:[[2000,0],[2240,0],[2240,240],[2000,240]], bim:{kind:'column',h:80,base:2550} },
    ]);
    S0.selection.clear(); S0.entities.forEach(e => S0.selection.add(e.id));
    C.INSTANT_CMDS['setaslight']();
    eqi(S0.lights.length, 2, '광원 2개 지정');
    C.renderProps();
    const D = document.getElementById('app').contentWindow.document;
    const sl = k => D.querySelector(`input[type=range][data-ls="${k}"]`);
    const num = k => D.querySelector(`input[data-lk="${k}"]`);
    ok(!!sl('intensity') && !!sl('colorTemp'), '★ 다중 선택 패널에도 광원 슬라이더가 있다 (§3.1 일괄 편집)');
    eqi(sl('intensity').min, '2', '  세기 슬라이더는 로그 스케일 (100lm = 10^2)');
    eqi(sl('intensity').max, '4.301', '  최대 20,000lm = 10^4.301');
    eqi(sl('colorTemp').min, '1800', '  색온도 1800K~');
    eqi(sl('colorTemp').max, '10000', '  ~10000K');
    ok(/linear-gradient/.test(sl('colorTemp').style.background), '  색온도 슬라이더에 색 그라데이션');
    eqi(D.querySelectorAll('[data-lpre]').length, 4, '  프리셋 4종 (§3.1은 3~5개)');

    // ★ 드래그가 실행취소 기록을 오염시키면 안 된다
    const u0 = C.undoStack.length;
    const ct = sl('colorTemp');
    ct.dispatchEvent(new PointerEvent('pointerdown', { bubbles:true }));
    for (let k = 3000; k <= 4000; k += 50) { ct.value = String(k); ct.dispatchEvent(new Event('input', { bubbles:true })); }
    eqi(C.undoStack.length - u0, 1, '★ 드래그 21스텝에도 undo는 1개만 (스냅샷은 도면 전체 JSON이라 매번 쌓으면 기록이 뒤덮인다)');
    ok(S0.lights.every(L => L.colorTemp === 4000), '  드래그가 선택된 광원 전부에 일괄 반영');
    eqi(num('colorTemp').value, '4000', '  숫자 입력도 동기화');
    ok(D.querySelector('input[data-ls="colorTemp"]') === ct, '  드래그 중 패널을 다시 그리지 않는다 (슬라이더가 사라지면 안 됨)');
    ct.dispatchEvent(new Event('change', { bubbles:true }));

    // 프리셋 일괄
    C.renderProps();
    D.querySelectorAll('[data-lpre]')[0].click();
    ok(S0.lights.every(L => L.intensity === 800 && L.colorTemp === 3000), '프리셋 "다운라이트" → 800lm/3000K 일괄');
    reset();
  }

  // ---------- 조도 분석 (Phase 4) ----------
  group('태양 — 위치·일사·물리 하늘');
  {
    const S = () => Object.assign(C.sunDefaults(), { mo: 6, d: 21 });
    // 남중고도 = 90 - |위도 - 적위|.  하지 적위 +23.44°, 동지 -23.44°
    const noon = (s) => { const n = C.sunNoonMinutes(s); return C.solarPosition(Object.assign({}, s, { h: Math.floor(n/60), mi: Math.round(n%60) })); };
    eq(noon(S()).alt, 90 - Math.abs(37.5665 - 23.44), '서울 하지 남중고도 = 75.87°', 0.1);
    eq(noon(Object.assign(S(), { mo: 12, d: 21 })).alt, 90 - Math.abs(37.5665 + 23.44), '서울 동지 남중고도 = 28.99°', 0.1);
    eq(C.solarPosition(S()).decl, 23.44, '하지 적위 = +23.44°', 0.1);
    eq(C.solarPosition(Object.assign(S(), { mo: 12, d: 21 })).decl, -23.44, '동지 적위 = -23.44°', 0.1);
    ok(Math.abs(noon(S()).az - 180) < 1, '북반구 남중 방위 = 정남(180°)');
    const syd = Object.assign(S(), { lat: -33.8688, lon: 151.2093, tz: 600 });
    eq(noon(syd).alt, 90 - Math.abs(-33.8688 - 23.44), '시드니 하지 남중고도 = 32.69°', 0.1);
    ok(Math.min(Math.abs(noon(syd).az), Math.abs(noon(syd).az - 360)) < 1, '남반구 남중 방위 = 정북');
    // 태양 방향벡터 (기본 진북 = +Y, 동 = +X, 위 = +Z)
    const d = C.sunDirection(Object.assign(S(), { h: Math.floor(C.sunNoonMinutes(S())/60), mi: Math.round(C.sunNoonMinutes(S())%60) }));
    ok(d.y < 0, '남중이면 태양이 남쪽(y<0)');
    ok(Math.abs(d.x) < 0.02, '남중이면 동서 성분 없음');
    ok(d.z > 0, '낮이면 태양이 하늘 위(z>0)');
    // 직달 조도 — 교과서: 맑은 날 정오 직달 ≈ 100,000 lx
    const clear = Object.assign(S(), { turbidity: 2 });
    const cn = C.sunNoonMinutes(clear);
    const dni = C.sunDirectIlluminance(Object.assign({}, clear, { h: Math.floor(cn/60), mi: Math.round(cn%60) }));
    ok(dni > 90000 && dni < 105000, '맑은 날 남중 직달조도 ≈ 100,000 lx');
    ok(C.sunDirectIlluminance(Object.assign({}, clear, { h: Math.floor(cn/60), mi: Math.round(cn%60), turbidity: 6 })) < dni, '탁해지면 직달조도가 준다');
    ok(C.sunDirectIlluminance(Object.assign(S(), { h: 2, mi: 0 })) === 0, '해가 지면 직달조도 0');
    // 태양 원반 휘도 ≈ 직달조도 / 입체각 (알려진 값 1.6e9 자릿수)
    const L = C.sunDiskLuminance(Object.assign({}, clear, { h: Math.floor(cn/60), mi: Math.round(cn%60) }));
    ok(L > 5e8 && L < 3e9, '태양 원반 휘도 ≈ 1e9 cd/m² 자릿수');
    // 대기질량: 천정에서 1, 낮을수록 커진다
    eq(C.sunAirMass(90), 1, '천정 대기질량 = 1', 0.01);
    ok(C.sunAirMass(10) > 4, '고도가 낮으면 대기질량이 커진다');
    // 물리 하늘: 천정은 파랗다
    const zen = C.skyRadiance(0, Math.PI/4, Math.PI/4, 3);
    ok(zen[2] > zen[0], '천정 하늘은 파랑 > 빨강');
    ok(zen[1] > 0, '하늘 휘도가 양수');
    // 탁도 제한 — Preetham 은 맑은 하늘 모델이라 흐림은 표현 못 한다
    eq(C.skyTurbidity({ turbidity: 1 }), 2, '탁도 하한 2로 제한');
    eq(C.skyTurbidity({ turbidity: 20 }), 6, '탁도 상한 6으로 제한');
    // 진북을 돌리면 방위가 그만큼 돌아간다
    const b0 = C.sunDirection(Object.assign(S(), { h: 15, mi: 0, north: 0 }));
    const b90 = C.sunDirection(Object.assign(S(), { h: 15, mi: 0, north: 90 }));
    ok(Math.abs(b0.alt - b90.alt) < 1e-6 && Math.abs(b0.x - b90.x) > 0.1, '진북을 90° 돌리면 태양 방향도 90° 돈다');
    // 노출 — 주광과 실내는 자동으로 달라야 한다
    ok(C.RT_EXPOSURE_DAY < 1e-3, '주광 노출이 실내보다 훨씬 작다');
  }

  group('태양 — 3D 뷰 조명 연동');
  {
    reset();
    const S = C.sunState();
    Object.assign(S, C.sunDefaults(), { mo: 6, d: 21, h: 15, mi: 0, enabled: false });
    ok(!C.sunOn(), '태양은 기본 OFF (기존 화면 불변)');
    ok(!C.lightSources().some(g => g.sun), '꺼져 있으면 광원 목록에 태양이 없다');
    ok(C.litAmbient() < 0.2, '꺼져 있으면 환경광은 야간값');
    S.enabled = true;
    ok(C.sunOn(), '켜면 sunOn() true');
    ok(C.litAmbient() > 0.2, '켜면 환경광이 하늘값으로 오른다');
    const sl = C.lightSources().filter(g => g.sun);
    ok(sl.length === 1, '켜면 광원 목록에 태양이 들어간다');
    const g = sl[0];
    ok(g.far2 === Infinity, '태양은 거리 컬링에 안 걸린다');
    ok(g.range > 1e9, '태양은 거리감쇠가 사실상 없다 (평행광)');
    // 반그림자: soft = D×0.00925 → 폭 = soft×h/D = h×0.00925 로 D 와 무관
    const V = C.v3;
    const D = Math.hypot(g.x - (V ? V.cx : 0), g.y - (V ? V.cy : 0), g.z - (V ? V.cz : 0));
    eq(g.soft / D, 0.00925, '태양 원반 각지름 = 0.53° (soft/D)', 1e-4);
    // 해가 지면 직사광이 없다
    S.h = 2; S.mi = 0;
    ok(!C.lightSources().some(x => x.sun), '해가 지평선 아래면 태양 광원이 없다');
    // 세기는 물리 직달조도에 비례 — 낮은 해가 더 약하다
    S.h = 12; S.mi = 30; const hi = C.sunLight().power;
    S.h = 18; S.mi = 0;  const lo = C.sunLight().power;
    ok(lo < hi, '해가 낮으면 직사광이 약해진다');
    ok(hi > 0.2 && hi < 1, '정오 태양 power 가 합리적 범위');
    S.enabled = false;
  }

  group('방향별 천공광 (구면조화)');
  {
    reset();
    const S = C.sunState();
    Object.assign(S, C.sunDefaults(), { mo: 6, d: 21, turbidity: 2, enabled: true });
    const n = C.sunNoonMinutes(S); S.h = Math.floor(n / 60); S.mi = Math.round(n % 60);
    const sh = C.skyProjectSH(S);
    const o = [0, 0, 0];
    const lum = (x, y, z) => { C.skyIrradiance(sh, x, y, z, o); return 0.2126 * o[0] + 0.7152 * o[1] + 0.0722 * o[2]; };
    // SH 조도를 무식한 반구 적분과 대조한다 (L2 라 오차 몇 % 는 정상)
    const K = C.skyCtx(S), rgb = [0, 0, 0];
    const brute = (nx, ny, nz) => {
      const NT = 120, NP = 240; let R = 0, G = 0, B = 0;
      for (let i = 0; i < NT; i++) {
        const th = (i + 0.5) / NT * Math.PI, st = Math.sin(th), ct = Math.cos(th);
        const dOm = (Math.PI / NT) * (2 * Math.PI / NP) * st;
        for (let j = 0; j < NP; j++) {
          const ph = (j + 0.5) / NP * 2 * Math.PI;
          const dx = st * Math.cos(ph), dy = st * Math.sin(ph), dz = ct;
          const c = dx * nx + dy * ny + dz * nz; if (c <= 0) continue;
          C.skyDirRadiance(K, dx, dy, dz, rgb);
          R += rgb[0] * c * dOm; G += rgb[1] * c * dOm; B += rgb[2] * c * dOm;
        }
      }
      return 0.2126 * R + 0.7152 * G + 0.0722 * B;
    };
    const up = lum(0, 0, 1), bUp = brute(0, 0, 1);
    ok(Math.abs(up - bUp) / bUp < 0.05, '위쪽 면: SH 조도가 무식한 적분과 5% 안');
    ok(Math.abs(lum(0, -1, 0) - brute(0, -1, 0)) / brute(0, -1, 0) < 0.05, '남향 벽: SH 조도가 무식한 적분과 5% 안');
    // ★ 핵심: 방향마다 달라야 한다 (상수 환경광이면 전부 같다)
    ok(up > lum(0, -1, 0) && up > lum(0, 1, 0), '위쪽 면이 가장 밝다');
    ok(lum(0, 0, -1) < lum(0, 1, 0), '아래를 보는 면이 가장 어둡다 (지면 반사만)');
    // 실측(맑은 날 남중): 위 24,161 lx / 아래 9,359 lx = 2.58배. 3배로 잡았다가 실패해서 실측에 맞췄다.
    ok(up / Math.max(1, lum(0, 0, -1)) > 2, '위:아래 천공광 차이가 2배 이상');
    ok(lum(0, -1, 0) > lum(0, 1, 0), '남중 때 남향 벽이 북향 벽보다 밝다');
    // 하늘빛은 파랗고, 지면 반사는 중성에 가깝다
    C.skyIrradiance(sh, 0, 0, 1, o); const upBR = o[2] / o[0];
    C.skyIrradiance(sh, 0, 0, -1, o); const dnBR = o[2] / o[0];
    ok(upBR > 2, '위쪽 면은 파란 하늘빛 (B/R > 2)');
    ok(dnBR < upBR, '아래 면은 지면 반사라 덜 파랗다');
    // 조도 → 밝기 환산이 직사광과 같은 자를 쓴다
    eq(C.shadePerLux() * 100000, C.SUN_LIT_POWER * 2.7, '조도→밝기 계수가 직사광과 일치', 1e-9);
    // 태양이 꺼지면 예전 야간 환경광
    S.enabled = false;
    C.litSky(0, 0, 1);
    ok(C.litAmbient() < 0.2, '태양 OFF 면 천공광 대신 야간 환경광');
    S.enabled = false;
  }

  group('면 피킹은 조명과 무관해야 한다 (extrudesrf 보호)');
  {
    // 회귀 방지: 조명/태양을 켜면 pushLitPoly 가 표시용 면을 잘게 쪼갠다.
    // 피킹이 그 배열을 쓰면 같은 자리를 클릭해도 다른 면(fi)이 잡혀 extrudesrf 면 밀당이 깨진다.
    // 실제로 그렇게 깨뜨린 적이 있다 — 태양 OFF fi=1 / ON fi=0.
    reset();
    setEnts([{ id: 1, type: 'LWPOLYLINE', layer: '0', color: '#c8c4bc', closed: true,
      points: [[-1000, -1000], [1000, -1000], [1000, 1000], [-1000, 1000]], bim: { kind: 'column', base: 0, h: 2000 } }]);
    if (!C.v3) C.INSTANT_CMDS['view3d']();
    const V = C.v3;
    V.pitch = 45 * Math.PI / 180; V.yaw = 0.6;
    C.INSTANT_CMDS.zoom();   // 3D 화면 맞춤 (전체보기)
    const hq = () => { V._fast = false; clearTimeout(V._settleT); C.render3D(); };
    const probes = [[0, -1000, 1000], [1000, 0, 1000], [0, 1000, 1000], [-1000, 0, 1000], [0, 0, 2000]];
    const collect = () => probes.map(([x, y, z]) => {
      const p = C.proj3D(x, y, z);
      const f = C.findFaceAt(Math.round(p[0]), Math.round(p[1]));
      return f ? f.fk + '/' + f.fi : 'null';
    }).join(' ');
    const S = C.sunState();
    Object.assign(S, C.sunDefaults(), { mo: 6, d: 21, h: 15, mi: 0, enabled: false });
    hq();
    const off = collect(), facesOff = V.faces.length, pickOff = (V.pick || []).length;
    S.enabled = true; hq();
    const on = collect(), facesOn = V.faces.length, pickOn = (V.pick || []).length;
    ok(facesOn > facesOff, '태양을 켜면 표시용 면은 쪼개진다 (빛 웅덩이)');
    eqi(pickOn, pickOff, '피킹용 면 개수는 조명과 무관하게 같다');
    eqi(on, off, '★같은 자리 클릭 결과가 태양 ON/OFF 에서 동일');
    // 조명 보기(야간)로도 같아야 한다
    S.enabled = false; V.lighting = true; hq();
    const lit = collect();
    eqi(lit, off, '★조명 보기(야간)를 켜도 피킹 결과가 같다');
    V.lighting = false; S.enabled = false;
    // 조작 중(_fast) 에도 같아야 한다 — _fast 는 쪼개기를 건너뛴다
    V._fast = true; C.render3D();
    const fast = collect();
    eqi(fast, off, '★조작 중(_fast)에도 피킹 결과가 같다');
    V._fast = false;
  }

  group('조도 분석 — 조도(lux)·False Color·측정면·CSV');
  {
    if (!C.v3) C.INSTANT_CMDS['view3d']();
    const V3 = C.v3;
    setEnts([
      { type:'LWPOLYLINE', closed:true, layer:'0', points:[[0,0],[6000,0],[6000,4000],[0,4000]], bim:{kind:'slab',t:100,top:0} },
      { type:'LWPOLYLINE', closed:true, layer:'0', points:[[2880,1880],[3120,1880],[3120,2120],[2880,2120]],
        bim:{kind:'column',h:80,base:2550}, light:{ intensity:800, colorTemp:3000 } },
    ]);
    V3.lighting = true; V3._fast = false; V3._occ = null; V3._bounce = null;
    V3.solids = C.bimSolids();
    V3._lights = C.lightSources();
    eqi(V3._lights.length, 1, '광원 1개');
    eq(V3._lights[0].lm, 800, '  광원이 물리 광속(lm)을 들고 있다 — 조도 계산의 근거');

    // ★ 조도는 손계산과 일치해야 한다. 단위(mm→m)를 틀리면 10^6 배 어긋난다 (§3.2)
    const em = C.lightEmitters(S0.entities[1], S0.lights[0])[0];
    const h = em.z / 1000;                       // 발광점 높이 (m)
    const hand = (800 / (4 * Math.PI)) / (h * h); // E = I/d²  (균등 배광)
    const got = C.illuminanceAt(3000, 2000, 0, 0, 0, 1);
    ok(Math.abs(got - hand) / hand < 0.02, '★ 조도가 손계산과 일치 (E = I/d², 단위 m)');
    // 코사인 법칙
    const d = Math.hypot(2000, em.z), cos = em.z / d;
    const hand2 = (800 / (4 * Math.PI)) * cos / Math.pow(d / 1000, 2);
    ok(Math.abs(C.illuminanceAt(5000, 2000, 0, 0, 0, 1) - hand2) / hand2 < 0.02, '  비스듬한 점도 코사인 법칙 일치');
    // 선형성
    S0.lights[0].intensity = 1600; V3._lights = C.lightSources();
    ok(Math.abs(C.illuminanceAt(3000, 2000, 0, 0, 0, 1) - got * 2) / got < 0.01, '  세기 2배 → 조도 정확히 2배');
    S0.lights[0].intensity = 800; V3._lights = C.lightSources();
    ok(C.illuminanceAt(3000, 2000, 0, 0, 0, -1) === 0, '  광원을 등진 면은 0 lux');

    // §4.1 False Color 스케일
    eqi(C.falseColor(250, 500), '#20c060', 'False Color 중간 = 초록');
    eqi(C.falseColor(9999, 500), '#ff3020', '  최대 이상 = 빨강');
    ok(C.falseColor(0, 500) !== C.falseColor(500, 500), '  0과 최대가 다른 색');
    ok(C.falseColor(250, 500) !== C.falseColor(250, 1000), '  스케일 최대값이 색을 바꾼다 (주거 500 / 사무 1000)');
    V3.falseColor = true; V3.fcMax = 500;
    ok(/F500/.test(C.litCacheSig()), '  조도 표시가 조명 캐시 서명에 들어간다 (안 그러면 옛 색이 남는다)');
    V3.falseColor = false;

    // §4.2 측정면
    S0.sensors.length = 0; S0.nextSensorId = 1;
    S0.sensors.push({ id:'S1', x0:0, y0:0, x1:6000, y1:4000, z:750, spacing:500 });
    const st = C.sensorMeasure(S0.sensors[0]);
    eqi(st.n, 117, '측정면 격자: 6000/500+1 × 4000/500+1 = 13×9 = 117점');
    ok(st.min > 0 && st.avg > st.min && st.max > st.avg, '  최소 < 평균 < 최대');
    ok(Math.abs(st.u0 - st.min / st.avg) < 1e-9, '  균제도 U0 = min/avg');

    // §4.2 CSV + §4.3 고지
    const csv = C.sensorCSV();
    const csvLines = csv.split(String.fromCharCode(10));
    eqi(csvLines[0], 'plane,x_mm,y_mm,z_mm,illuminance_lux', 'CSV 헤더');
    eqi(csvLines.filter(l => /^S1,/.test(l)).length, 117, '  측정점 117행');
    ok(/법규·인증용 조도 계산/.test(csv) && /균등 배광/.test(csv), '§4.3 CSV에 정확도 고지 (근사치임을 명시)');

    // 명령·별칭
    eqi(C.CMD_ALIASES['falsecolor'], 'falsecolor', "'falsecolor' 명령");
    eqi(C.CMD_ALIASES['조도'], 'falsecolor', "  한글 별칭 '조도'");
    eqi(C.CMD_ALIASES['측정면'], 'addsensorplane', "  '측정면' → addsensorplane");
    eqi(C.CMD_ALIASES['조도csv'], 'sensorcsv', "  '조도csv' → sensorcsv");
    V3.lighting = false; V3._lights = null; S0.sensors.length = 0;
    reset();
  }

  // ---------- 실제 광원 (조명 보기) ----------
  group('lighting — 지정한 광원이 3D를 실제로 밝힘 (야간 보기)');
  {
    // litFace는 v3(3D 뷰 상태)를 참조하므로 먼저 3D 뷰를 연다
    if (!C.v3) C.INSTANT_CMDS['view3d']();
    const V3 = C.v3;
    ok(!!V3, '3D 뷰 열림 (조명 계산의 전제)');
    const wasOn = V3 && V3.lighting;
    if (V3) V3.lighting = false;

    // litFace: 거리 제곱 감쇠 + 법선 반영
    if (V3) { V3.lighting = true; V3._lights = [{ x:0, y:0, z:2850, range:5000, power:1 }]; }
    const at = x => C.litFace(x, 0, 0, 0, 0, 1, false);
    ok(at(0) > at(2000) && at(2000) > at(4000) && at(4000) > at(8000), '가까울수록 밝다 (거리 제곱 감쇠)');
    ok(at(0) < 1.5, '  광원 바로 아래도 상한에 붙지 않음 (계조 유지)');

    // 조명 캐시 서명에 광원 색이 빠지면, 색온도를 바꿔도 캐시가 살아남아 옛 색이 그대로 남는다
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:8000, power:1, cr:1, cg:0.7, cb:0.4 }];
    const sigWarm = C.litCacheSig();
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:8000, power:1, cr:0.8, cg:0.9, cb:1 }];
    const sigCool = C.litCacheSig();
    ok(sigWarm !== sigCool, '★ 광원 색만 바뀌어도 조명 캐시가 무효화된다 (색온도가 화면에 반영되려면 필수)');
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:5000, power:1 }];

    // 톤매핑 — 밝기 합이 상한을 넘어도 하드 클립되지 않아야 한다.
    // (예전엔 min(1.5)로 잘라, 방 안 전 구간이 1.5로 같아지며 감쇠·그림자 계조가 사라졌다)
    const FAR2 = (8000 * 6) * (8000 * 6);
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:8000, power:1, far2:FAR2, soft:0, bounce:0 }];
    const hot = C.litFace(0, 0, 0, 0, 0, 1, false);      // 원시 밝기 ≈ 2.5 — 상한 1.5를 넘음
    const warm = C.litFace(2500, 0, 0, 0, 0, 1, false);  // 원시 ≈ 1.8 — 여전히 상한 위
    ok(hot > 1.0 && hot < 1.5, '톤매핑: 상한을 넘는 밝기도 1.5에 붙지 않음');
    ok(warm > 1.0 && warm < 1.5, '  조금 떨어진 곳도 마찬가지');
    ok(hot - warm > 0.03, '  상한 위 구간에서도 밝기 차가 남는다 (하드 클립이면 둘 다 1.5로 같아짐)');
    // 무릎 아래(어두운 곳)는 압축하지 않는다 — 밝기를 2배로 하면 증가분도 정확히 2배(선형)
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:8000, power:0.05, far2:FAR2, soft:0, bounce:0 }];
    const w1 = C.litFace(0, 0, 0, 0, 0, 1, false);
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:8000, power:0.10, far2:FAR2, soft:0, bounce:0 }];
    const w2 = C.litFace(0, 0, 0, 0, 0, 1, false);
    ok(w1 < 0.9 && w2 < 0.9, '  약한 빛은 무릎(0.9) 아래');
    ok(Math.abs((w2 - 0.16) - 2 * (w1 - 0.16)) < 1e-9, '  무릎 아래는 압축 없이 선형 — 어두운 곳의 느낌 보존');
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:5000, power:1 }];
    ok(Math.abs(at(50000) - 0.16) < 0.05, '  아주 먼 곳은 야간 환경광(0.16)으로 수렴');
    ok(C.litFace(0, 0, 0, 0, 0, -1, false) < 0.2, '광원을 등진 면은 어둡다');
    // power / range 특성
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:5000, power:2 }];
    const p2 = C.litFace(4000, 0, 0, 0, 0, 1, false);
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:5000, power:1 }];
    const p1 = C.litFace(4000, 0, 0, 0, 0, 1, false);
    ok(p2 > p1, 'power를 올리면 밝아짐');
    if (V3) V3._lights = [{ x:0, y:0, z:2850, range:1500, power:1 }];
    ok(C.litFace(4000, 0, 0, 0, 0, 1, false) < p1, 'range를 줄이면 먼 곳이 더 어두워짐');
    if (V3) { V3.lighting = false; V3._lights = null; }

    // lightSources: 지정한 개체 → 광원 (개체가 놓인 z 그대로)
    setEnts([{ type:'LINE', x1:0, y1:0, x2:6000, y2:0, layer:'0', zo:2800,
               light:{spacing:6000} }]);
    const src = C.lightSources();
    eqi(src.length, 2, 'lightSources: 발광 지점마다 광원 1개');
    eq(src[0].z, 2800, '  광원 높이 = 개체가 놓인 z (zo)');
    eq(src[0].soft, 400, '  soft 기본 400 (부드러운 그림자 기본 ON)');
    eq(src[0].bounce, 0.5, '  bounce 기본 0.5 (간접광 기본 ON)');
    eq(src[0].range, 3000, '  range 기본 3000 — 키우면 방 안에서 감쇠가 사라져 다시 하얗게 뜬다');
    eq(src[0].power, 1, '  power 기본 1 (특성창 라벨 "1=기본"과 일치)');
    // 광원 지정이 없으면 광원 0
    setEnts([{ type:'LINE', x1:0, y1:0, x2:1000, y2:0, layer:'0' }]);
    eqi(C.lightSources().length, 0, '광원으로 지정하지 않으면 광원 없음');

    // ── 그림자 ──
    // 바닥 + 조명(x=0) + 벽(x=2000) → 벽 뒤는 그림자, 벽을 지우면 밝아져야 (대조군)
    setEnts([
      { type:'LWPOLYLINE', closed:true, points:[[-12000,-6000],[12000,-6000],[12000,6000],[-12000,6000]], layer:'0', bim:{kind:'slab', t:100, top:0} },
      { type:'LINE', x1:0, y1:-1, x2:0, y2:1, layer:'0', zo:2850, light:{spacing:99999, range:8000, intensity:960, color:[255,255,255]} },
      { type:'LINE', x1:2000, y1:-4000, x2:2000, y2:4000, layer:'0', bim:{kind:'wall', h:2500, t:200, base:0} },
    ]);
    if (V3) {
      V3.lighting = true; V3._fast = false;
      V3.solids = C.bimSolids();
      V3._lights = C.lightSources();
      V3._occ = C.shadowOccluders();
      ok(V3._occ.length > 0, '가림 형상(벽·바닥) 수집됨');
      // 광원으로 지정한 개체는 가림에서 빠져야 한다 — 안 그러면 자기 형상이 자기 빛을 막아 캄캄해진다
      const before = C.shadowOccluders().length;
      S0.entities.push({ id: 999, type:'LWPOLYLINE', closed:true, layer:'0',
        points:[[-500,-500],[500,-500],[500,500],[-500,500]], bim:{kind:'column', h:400, base:2600} });
      V3.solids = C.bimSolids();
      const withCube = C.shadowOccluders().length;
      const cube = S0.entities[S0.entities.length-1];   // 같은 정육면체를 광원으로 지정
      S0.lights.push({ id:'LX', objectId:cube.id, name:'cube', type:'emissive', enabled:true,
        intensity:800, colorTemp:3000, color:null, range:3000, soft:400, bounce:0.5 });
      cube.lightId = 'LX';
      V3.solids = C.bimSolids();
      const asLight = C.shadowOccluders().length;
      ok(withCube > before, '  정육면체를 넣으면 가림 삼각형이 늘어난다 (대조군)');
      eqi(asLight, before, '  그 정육면체를 광원으로 지정하면 가림에서 빠진다 (자기 빛을 안 막음)');
      S0.entities.pop(); S0.lights.pop(); V3.solids = C.bimSolids();
      const at = x => C.litFace(x, 0, 0, 0, 0, 1, false);
      ok(at(1000) > 0.8, '조명과 벽 사이(벽 앞) 바닥은 밝다');
      ok(at(4000) < 0.3, '벽 뒤 바닥은 그림자 (환경광만)');
      ok(at(7000) < 0.3, '  더 멀리도 그림자 안');
      ok(at(1000) - at(4000) > 0.5, '  그림자 경계가 뚜렷');
      // 대조군: 벽을 지우면 같은 자리가 밝아져야 = 그림자의 원인이 벽임을 증명
      S0.entities = S0.entities.filter(e => !(e.bim && e.bim.kind === 'wall'));
      V3.solids = C.bimSolids();
      V3._occ = C.shadowOccluders();
      ok(C.litFace(4000, 0, 0, 0, 0, 1, false) > 0.8, '벽을 지우면 같은 자리가 밝아짐 (그림자의 원인 = 벽)');
      V3._occ = null; V3._lights = null; V3.lighting = false;
    }

    // ── 부드러운 그림자(펜엄브라) ──
    // 램프를 넓이가 있는 광원으로 보고 여러 점을 샘플 → 보이는 비율이 곧 빛의 세기.
    setEnts([
      { type:'LWPOLYLINE', closed:true, points:[[-12000,-6000],[12000,-6000],[12000,6000],[-12000,6000]], layer:'0', bim:{kind:'slab', t:100, top:0} },
      { type:'LINE', x1:0, y1:-1, x2:0, y2:1, layer:'0', zo:2850, light:{spacing:99999, range:20000, intensity:960, color:[255,255,255]} },
      { type:'LINE', x1:2000, y1:-5000, x2:2000, y2:5000, layer:'0', bim:{kind:'wall', h:1500, t:200, base:0} },
    ]);
    if (V3) {
      V3.lighting = true; V3._fast = false;
      V3.solids = C.bimSolids();
      V3._lights = C.lightSources();
      V3._occ = C.shadowOccluders();
      const scan = sv => {
        for (const g of V3._lights) g.soft = sv;
        const r = [];
        for (let x = 3200; x <= 4800; x += 100) r.push(C.litFace(x, 0, 0, 0, 0, 1, false));
        return r;
      };
      const midCount = a => a.filter(v => v > 0.25 && v < 1.3).length; // 반그림자(중간 밝기) 개수
      const hard = scan(0), soft = scan(800), softer = scan(2000);
      eqi(midCount(hard), 0, '하드(soft=0): 그림자 경계가 계단 — 중간 밝기 없음');
      ok(midCount(soft) > 0, '부드러운 그림자(soft=800): 경계에 반그림자(중간 밝기) 생김');
      ok(midCount(softer) >= midCount(soft), '광원이 클수록(soft=2000) 반그림자가 더 넓다');
      ok(hard.some(v => v < 0.2) && hard.some(v => v > 1.2), '  하드도 그림자/빛 양쪽은 그대로');
      // 광원 크기 0 = 점광원 → visFraction이 0 또는 1만 반환
      for (const g of V3._lights) g.soft = 0;
      const vf = C.visFraction(1000, 0, 0, V3._lights[0], V3._lights[0].x - 1000, V3._lights[0].y, V3._lights[0].z, Math.hypot(1000, V3._lights[0].z));
      ok(vf === 0 || vf === 1, 'soft=0이면 가림 판정이 0/1 (점광원)');
      V3._occ = null; V3._lights = null; V3.lighting = false;
    }

    // ── 간접광 (1회 반사) ──
    // 방 + 가운데 조명 + 가림벽 → 그림자 안이 바닥·벽에 튕긴 빛으로 밝아져야 (단, 직접광보다는 어둡게)
    setEnts([
      { type:'LWPOLYLINE', closed:true, points:[[-8000,-5000],[8000,-5000],[8000,5000],[-8000,5000]], layer:'0', bim:{kind:'slab', t:100, top:0} },
      { type:'LWPOLYLINE', closed:true, points:[[-8000,-5000],[8000,-5000],[8000,5000],[-8000,5000]], layer:'0', bim:{kind:'wall', h:3000, t:200, base:0} },
      { type:'LINE', x1:0, y1:-1, x2:0, y2:1, layer:'0', zo:2650, light:{spacing:99999, range:8000, intensity:960, soft:400, color:[255,255,255]} },
      { type:'LINE', x1:2000, y1:-4000, x2:2000, y2:4000, layer:'0', bim:{kind:'wall', h:2000, t:200, base:0} },
    ]);
    if (V3) {
      V3.lighting = true; V3._fast = false;
      V3.solids = C.bimSolids();
      V3._lights = C.lightSources();
      V3._occ = C.shadowOccluders();
      const at = x => C.litFace(x, 0, 0, 0, 0, 1, false);

      V3._bounce = null; // 간접광 없이
      const offShadow = at(4000), lit = at(1000);
      eq(offShadow, 0.16, '간접광 없으면 그림자 안은 환경광으로 균일');

      for (const g of V3._lights) g.bounce = 0.5;
      V3._bounce = C.bounceLights();
      ok(V3._bounce.length > 0, '2차 광원(반사광)이 생성됨');
      ok(V3._bounce.length <= 96, '  2차 광원 수에 상한이 있다 (성능)');
      const onShadow = at(4000);
      ok(onShadow > offShadow, '그림자 안이 반사광으로 밝아짐 (균일하지 않게 됨)');
      ok(onShadow < lit * 0.5, '  그래도 직접광의 절반 이하 — 여전히 그림자로 보인다');
      ok(at(4000) > at(6000), '  반사광도 거리에 따라 감쇠');
      // 세기 조절
      for (const g of V3._lights) g.bounce = 1.5;
      V3._bounce = C.bounceLights();
      ok(at(4000) > onShadow, '간접광 세기를 올리면 더 밝아짐');
      // 끄기
      for (const g of V3._lights) g.bounce = 0;
      V3._bounce = C.bounceLights();
      eqi(V3._bounce.length, 0, 'bounce=0이면 간접광 끔 (2차 광원 없음)');
      eq(at(4000), 0.16, '  끄면 그림자 안이 다시 균일');
      V3._bounce = null; V3._occ = null; V3._lights = null; V3.lighting = false;
    }

    // ── 색번짐 (컬러 블리딩) ──
    // 회색 바닥 + 색 있는 벽 → 반사광이 벽 색을 옮겨와 바닥이 그 색으로 물든다.
    const bleed = (wallColor, bounce) => {
      setEnts([
        { type:'LWPOLYLINE', closed:true, points:[[-6000,-4000],[6000,-4000],[6000,4000],[-6000,4000]], layer:'0', color:'#9a9a9a', bim:{kind:'slab', t:100, top:0} },
        { type:'LINE', x1:-3000, y1:0, x2:-3000, y2:1, layer:'0', zo:2375, light:{spacing:99999, range:9000, intensity:960, soft:300, bounce, color:[255,255,255]} },
        { type:'LINE', x1:2000, y1:-4000, x2:2000, y2:4000, layer:'0', color:wallColor, bim:{kind:'wall', h:2500, t:200, base:0} },
      ]);
      V3.lighting = true; V3._fast = false;
      V3.solids = C.bimSolids();
      V3._lights = C.lightSources();
      V3._occ = C.shadowOccluders();
      V3._bounce = C.bounceLights();
      C.litFace(1700, 0, 0, 0, 0, 1, false);
      return [C.LIT_RGB[0], C.LIT_RGB[1], C.LIT_RGB[2], C.LIT_RGB[3]];
    };
    if (V3) {
      const off = bleed('#ff2020', 0);
      eqi(off[3], 0, '간접광이 꺼져 있으면 색조 없음 (채널별 밝기 미사용 = 기존 렌더 경로)');
      const red = bleed('#ff2020', 0.8);
      eqi(red[3], 1, '빨간 벽 + 간접광 → 색조 발생');
      ok(red[0] > red[1] && red[0] > red[2], '  회색 바닥의 R 채널이 G·B보다 밝다 (붉게 물듦)');
      const grn = bleed('#20ff20', 0.8);
      ok(grn[1] > grn[0] && grn[1] > grn[2], '초록 벽 → 바닥의 G 채널이 가장 밝다');
      const gry = bleed('#9a9a9a', 0.8);
      eqi(gry[3], 0, '회색 벽 → 색조 없음 (채널이 고르면 스칼라 경로로)');
      // 실제 칠해질 색
      const c = C.shadeColor3('#9a9a9a', red);
      ok(c[0] > c[1] && c[0] > c[2], '실제 칠해지는 색도 붉은 회색이 된다');
      // shadeColor3 자체
      const t = C.shadeColor3('#808080', [1, 0.5, 0.5]);
      eqi(t[0], 128, 'shadeColor3: R 채널 그대로'); eqi(t[1], 64, '  G 채널 절반'); eqi(t[2], 64, '  B 채널 절반');
      V3._bounce = null; V3._occ = null; V3._lights = null; V3.lighting = false;
    }

    if (V3) V3.lighting = !!wasOn;
    reset();
  }

  // ---------- 명령어 체계: 라이노 이름 + 2D/3D 분리 재발 방지 ----------
  group('명령어 체계 — 라이노 이름 준수 / 평면·3D 전용 분리 금지');
  {
    const A = C.CMD_ALIASES;
    const canon = [...new Set(Object.values(A))];

    // 1) "move / 3dmove"처럼 차원별로 쪼갠 명령이 다시 생기면 실패 — 사용자가 명시적으로 금지한 패턴.
    //    view3d는 편집 명령이 아니라 뷰 전환 토글이므로 예외.
    const VIEW_OK = ['view3d'];
    const split = canon.filter(n => !VIEW_OK.includes(n) && /(^|[^a-z])[23]d|[23]d$/.test(n));
    ok(split.length === 0, '차원별로 쪼갠 명령 없음 (있으면: ' + (split.join(', ') || '없음') + ')');

    // 2) 과거에 존재했던 분리 명령들이 완전히 사라졌는지
    for (const dead of ['move3d','3dmove','copy3d','3dcopy','mirror3d','array3d','scale3d','rotate3d','fillet3d','intersect3d'])
      ok(!A[dead], `분리 명령 '${dead}' 제거됨`);

    // 3) 공용 명령은 하나로 — 평면/3D 구분 없이 같은 이름
    for (const [k, want] of [['move','move'],['m','move'],['copy','copy'],['co','copy'],
                             ['rotate','rotate'],['mirror','mirror'],['scale','scale'],['array','array']])
      eqi(A[k], want, `'${k}' → ${want} (평면·3D 공용)`);

    // 4) 라이노 정식 이름/단축키가 동작해야 (노드 개발 시 호환성 기준)
    for (const [k, want] of [
      ['booleanunion','booleanunion'], ['bu','booleanunion'], ['union','booleanunion'],
      ['booleandifference','booleandifference'], ['bd','booleandifference'], ['difference','booleandifference'],
      ['booleanintersection','booleanintersection'], ['bi','booleanintersection'], ['boolint','booleanintersection'],
      ['filletedge','filletedge'], ['fe','filletedge'],
      ['distance','dist'], ['matchproperties','matchprop'], ['curve','spline'], ['interpcrv','spline'],
      ['polyline','pline'], ['rectangle','rect'], ['delete','erase'], ['extrude','extrudecrv'],
    ]) eqi(A[k], want, `라이노 이름 '${k}' → ${want}`);

    // 5) 별칭이 가리키는 정식 이름은 전부 실행 가능해야 — 즉시실행(INSTANT_CMDS) 아니면 도구(TOOL_KO).
    //    둘 다 아니면 입력해도 아무 일도 안 일어나는 죽은 명령이다.
    const dead = canon.filter(n => !C.INSTANT_CMDS[n] && !C.TOOL_KO[n]);
    ok(dead.length === 0, '죽은 별칭 없음 — 모든 정식 이름이 실행 가능 (' + (dead.join(', ') || '없음') + ')');
  }

  // ---------- 이미지 DXF 보존 ----------
  group('이미지 — DXF 저장/불러오기 보존 (999 WCX)');
  {
    const SRC = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==';
    setEnts([
      { type:'IMAGE', layer:'밑그림', x:-10, y:-20, w:100, h:60, src:SRC, rot:33, op:0.6, sat:1.4, bri:0.8, flip:true },
      { type:'LINE', x1:0, y1:0, x2:100, y2:0, layer:'0' },
    ]);
    S0.layers = [{name:'0',color:'#ffffff',visible:true},{name:'밑그림',color:'#8a8a94',visible:true}];
    const dxf = C.buildDXFText();
    ok(dxf.includes('999'), 'DXF에 999 WCX 블록 존재');
    ok(!/^\s*0\s*\nIMAGE\s*$/m.test(dxf), '표준 DXF 엔티티로는 IMAGE를 쓰지 않음 (외부 파일 참조 방식이라 라이노에서 깨짐)');

    C.loadDXF(dxf, 'rt.dxf');
    const im = S0.entities.find(e => e.type === 'IMAGE');
    ok(!!im, '왕복 후 이미지가 살아남음 (예전엔 저장하면 사라졌음)');
    if (im) {
      eq(im.x, -10, '  x 보존'); eq(im.y, -20, '  y 보존');
      eq(im.w, 100, '  폭 보존'); eq(im.h, 60, '  높이 보존');
      eq(im.rot, 33, '  회전 보존');
      eq(im.op, 0.6, '  투명도 보존'); eq(im.sat, 1.4, '  채도 보존'); eq(im.bri, 0.8, '  명도 보존');
      ok(im.flip === true, '  좌우반전 보존');
      eqi(im.src, SRC, '  이미지 데이터 무손실');
      eqi(im.layer, '밑그림', '  레이어 보존');
    }
    ok(S0.entities.some(e => e.type === 'LINE'), '일반 도형도 함께 보존(공존)');
    // id 충돌 없이 복원되어야 (선택·삭제가 엉뚱한 객체를 잡는 것 방지)
    const ids = S0.entities.map(e => e.id);
    eqi(new Set(ids).size, ids.length, '복원된 이미지 id가 기존 도형과 겹치지 않음');
    ok(S0.nextId > Math.max(...ids), 'nextId가 최대 id보다 큼');
    reset();
  }

  // ---------- id 충돌 방지 ----------
  group('applyDoc — nextId는 항상 최대 id보다 커야 함 (선택·삭제 오작동 방지)');
  {
    // 저장본의 nextId가 뒤처진 경우(옛 파일/손상된 세션)에도 새 도형이 기존 id와 겹치면 안 됨
    reset();
    const before = S0.entities.length;
    C.applyDoc({ entities: [{id:7,type:'CIRCLE',cx:0,cy:0,r:5,layer:'0'}], nextId: 1, layers: S0.layers, currentLayer: '0' });
    ok(S0.nextId > 7, `손상된 nextId(1) 보정 → ${S0.nextId} > 7`);
    reset();
  }
}

document.getElementById('rerun').addEventListener('click', () => { if(T) runAll(); });
document.getElementById('app').addEventListener('load', () => {
  setTimeout(() => {
    T = document.getElementById('app').contentWindow.__CADTEST__;
    if (!T) { S.innerHTML = '<span class="fail">__CADTEST__ 훅을 찾을 수 없습니다 (cad.js 로드 실패?)</span>'; return; }
    runAll();
  }, 300);
});
</script>
</body>
</html>
